name: Update earnings calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '37 6 * * *'
      timezone: 'America/Los_Angeles'
    - cron: '37 18 * * *'
      timezone: 'America/Los_Angeles'

permissions:
  contents: write

concurrency:
  group: earnings-calendar-update
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate subscribed calendar
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          CALENDAR_YEAR: '2026'
          PAST_LOOKBACK_DAYS: '90'
        run: python scripts/generate_calendar.py

      - name: Commit calendar changes only when needed
        run: |
          if git diff --quiet -- earnings_calendar.ics data/api_cache.json; then
            echo "No changes in earnings dates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add earnings_calendar.ics data/api_cache.json
          git commit -m "Auto-update earnings calendar"
          git push
