name: Update earnings calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '37 6 * * *'
      timezone: 'America/Los_Angeles'
    - cron: '37 18 * * *'
      timezone: 'America/Los_Angeles'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: earnings-calendar-update
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate subscribed calendar
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          CALENDAR_YEAR: '2026'
          FORECAST_DAYS_AHEAD: '90'
        run: python scripts/generate_calendar.py

      - name: Commit calendar changes only when needed
        run: |
          if git diff --quiet -- earnings_calendar.ics data/api_cache.json data/tickers.json; then
            echo "No calendar changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add earnings_calendar.ics data/api_cache.json data/tickers.json
            git commit -m "Auto-update earnings calendar via Finnhub"
            git push
          fi

      - name: Prepare Pages calendar site
        run: |
          mkdir -p public
          cp earnings_calendar.ics public/earnings_calendar.ics
          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
          <head><meta charset="utf-8"><title>Chloe Earnings Calendar 2026</title></head>
          <body>
            <h1>Chloe 美股财报雷达 2026</h1>
            <p>⏳ = 自动抓取财报日程；跨财报持仓前请核对公司 IR 官网。</p>
            <p><a href="earnings_calendar.ics">订阅 earnings_calendar.ics</a></p>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
